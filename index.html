<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Go WebSocket Chat</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        #chat-box { width: 100%; height: 300px; border: 1px solid #333; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #252526; }
        #msg-input { width: 80%; padding: 10px; background: #3c3c3c; color: white; border: 1px solid #555; }
        button { padding: 10px; background: #007acc; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Terminal Chat</h2>
    <div id="chat-box"></div>
    
    <input type="text" id="msg-input" placeholder="Mesajınızı yazın..." autofocus>
    <button onclick="sendMessage()">Gönder</button>

    <script>
        const chatBox = document.getElementById("chat-box");
        const msgInput = document.getElementById("msg-input");
        let socket; 
    
      
        let username = prompt("Lütfen bir kullanıcı adı girin:", "Anonim");
        if (username === null || username.trim() === "") {
            username = "Anonim";
        }
    
        
        socket = new WebSocket("ws://localhost:8080/ws?username=" + encodeURIComponent(username));
    
        socket.onopen = function() {
            console.log("Bağlantı açıldı, kullanıcı:", username);
        };
    
        socket.onmessage = function(event) {
            
            try {
                const data = JSON.parse(event.data);
                console.log("Gelen veri:", data);
                
                const color = (data.sender === username) ? "#2196F3" : "#FF9800"; 
                appendMessage(data.sender, data.message, color);
            } catch (e) {
            
                console.error("Geçersiz veri formatı:", event.data);
            }
        };
    
        socket.onclose = function(event) {
            appendMessage("SİSTEM", "Bağlantı koptu veya sunucu kapandı.", "#f44336");
        };
    
        function sendMessage() {
            const message = msgInput.value;
            if (message.trim() !== "") {
               
                socket.send(message);
                msgInput.value = ""; 
            }
        }
    
        msgInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    
        function appendMessage(sender, text, color) {
            const msgElement = document.createElement("div");
            msgElement.innerHTML = `<strong style="color:${color}">[${sender}]:</strong> ${text}`;
            chatBox.appendChild(msgElement);
            chatBox.scrollTop = chatBox.scrollHeight; 
        }
    </script>

</body>
</html>
