<!DOCTYPE html>
<html lang="tr">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Chat App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="login-overlay" class="overlay">
        <div class="modal">
            <h3>Sohbete Katıl</h3>
            <div id="login-error" style="color: #ef4444; margin-bottom: 10px; font-size: 14px; text-align: center; display: none;"></div>
            <input type="text" id="username-input" placeholder="Kullanıcı adınız..." autofocus>
            <input type="password" id="password-input" placeholder="Şifreniz..." style="margin-top: 10px;">
            <button onclick="startChat()" style="margin-top: 15px;">Giriş Yap / Kayıt Ol</button>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <h2>Go Chat</h2>
            <div class="status">
                <div class="status-dot"></div>
                <span id="conn-status">Bağlanıyor...</span>
            </div>
        </div>
        
        <div id="chat-box" class="chat-box">
        </div>
        
        <div class="chat-input-container">
            <input type="file" id="image-upload" accept="image/jpeg, image/png, image/gif" style="display: none;">
            
            <button id="attach-btn" onclick="document.getElementById('image-upload').click()" disabled title="Resim Ekle">
                <svg viewBox="0 0 24 24">
                    <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5a2.5 2.5 0 015 0v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"></path>
                </svg>
            </button>
            
            <input type="text" id="msg-input" placeholder="Bir mesaj yazın..." disabled>
            <button id="send-btn" onclick="sendMessage()" disabled title="Gönder">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
